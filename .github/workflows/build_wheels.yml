name: Build

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.job_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            job_name: ubuntu-latest
            artifact_suffix: ubuntu-latest
            cibw_environment_macos_extra: ""
            cibw_test_command_prefix: ""
          - os: ubuntu-24.04-arm
            job_name: ubuntu-24.04-arm
            artifact_suffix: ubuntu-24.04-arm
            cibw_environment_macos_extra: ""
            cibw_test_command_prefix: ""
          - os: windows-latest
            job_name: windows-latest
            artifact_suffix: windows-latest
            cibw_environment_macos_extra: ""
            cibw_test_command_prefix: ""
          - os: windows-11-arm
            job_name: windows-11-arm
            artifact_suffix: windows-11-arm
            cibw_environment_macos_extra: ""
            cibw_test_command_prefix: ""
          # Temporary macOS investigation matrix to isolate OpenMP runtime issues.
          - os: macos-14
            job_name: macos-14-baseline
            artifact_suffix: macos-14-baseline
            cibw_environment_macos_extra: ""
            cibw_test_command_prefix: ""
          - os: macos-14
            job_name: macos-14-omp1
            artifact_suffix: macos-14-omp1
            cibw_environment_macos_extra: ""
            cibw_test_command_prefix: "OMP_NUM_THREADS=1 "
          - os: macos-14
            job_name: macos-14-no-helper
            artifact_suffix: macos-14-no-helper
            cibw_environment_macos_extra: ""
            cibw_test_command_prefix: "LIBOMP_USE_HIDDEN_HELPER_TASK=0 LIBOMP_NUM_HIDDEN_HELPER_THREADS=0 "
          - os: macos-14
            job_name: macos-14-serial-control
            artifact_suffix: macos-14-serial-control
            cibw_environment_macos_extra: "ITZI_USE_OPENMP=0"
            cibw_test_command_prefix: ""
          - os: macos-14
            job_name: macos-14-flow-dir-numpy
            artifact_suffix: macos-14-flow-dir-numpy
            cibw_environment_macos_extra: "ITZI_FLOW_DIR_IMPL=numpy"
            cibw_test_command_prefix: ""
          - os: macos-14
            job_name: macos-14-flow-report-numpy
            artifact_suffix: macos-14-flow-report-numpy
            cibw_environment_macos_extra: "ITZI_FLOW_DIR_IMPL=numpy ITZI_REPORT_ARRAY_IMPL=numpy"
            cibw_test_command_prefix: ""
          - os: macos-14
            job_name: macos-14-openmp-smoke
            artifact_suffix: macos-14-openmp-smoke
            cibw_environment_macos_extra: ""
            cibw_test_command_prefix: ""
            cibw_test_command: "pytest tests/test_openmp_smoke.py"
          - os: macos-14
            job_name: macos-14-openmp-smoke-hydrology
            artifact_suffix: macos-14-openmp-smoke-hydrology
            cibw_environment_macos_extra: ""
            cibw_test_command_prefix: ""
            cibw_test_command: "pytest tests/test_openmp_smoke.py::test_flow_apply_hydrology_large_contiguous_arrays"
          - os: macos-14
            job_name: macos-14-openmp-smoke-wse
            artifact_suffix: macos-14-openmp-smoke-wse
            cibw_environment_macos_extra: ""
            cibw_test_command_prefix: ""
            cibw_test_command: "pytest tests/test_openmp_smoke.py::test_rastermetrics_calculate_wse_large_contiguous_arrays"

    steps:
      - uses: actions/checkout@v4

      - name: Set-up on MacOS
        if: ${{ matrix.os == 'macos-14' }}
        run: |
          brew install libomp

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.2.1
        env:
          CIBW_ARCHS: auto64  # Don't build 32 bits wheels
          CIBW_SKIP: pp*  # Don't build pypy wheels
          CIBW_ENVIRONMENT: "ITZI_BDIST_WHEEL=1 NO_STABLE_ABI=1"  # Trigger generic compiler flags
          CIBW_ENVIRONMENT_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=14.0
            ITZI_BDIST_WHEEL=1
            NO_STABLE_ABI=1
            ${{ matrix.cibw_environment_macos_extra }}
          CIBW_BEFORE_TEST: "pip install pytest pytest-benchmark pandas scipy"
          CIBW_TEST_SOURCES: tests
          CIBW_TEST_COMMAND: >  # Fast tests which do not require GRASS
            ${{ matrix.cibw_test_command_prefix }}${{ matrix.cibw_test_command || 'pytest -m "not slow and not cloud" tests/core/' }}

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.artifact_suffix }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz
